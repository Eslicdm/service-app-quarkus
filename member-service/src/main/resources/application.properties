# Application Configuration
quarkus.application.name=member-service
quarkus.http.port=8090
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:4200
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.exposed-headers=*

# Database Configuration
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${MEMBER_DB_USERNAME}
quarkus.datasource.password=${MEMBER_DB_PASSWORD}
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5435/${MEMBER_DB_NAME}
quarkus.datasource.jdbc.max-size=16

# Hibernate Configuration
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.sql-load-script=no-file

# Flyway Migration
#quarkus.flyway.migrate-at-start=true
#quarkus.flyway.baseline-on-migrate=true
#quarkus.flyway.baseline-version=0
#quarkus.flyway.locations=classpath:db/migration

# OIDC/Keycloak Configuration
quarkus.oidc.auth-server-url=http://keycloak:8080/realms/service-app-realm
quarkus.oidc.client-id=service-app-angular
quarkus.oidc.token.issuer=http://keycloak:8080/realms/service-app-realm

# Security
quarkus.http.auth.permission.public.paths=/api/v1/docs/*,/api/v1/openapi/*,/health/*
quarkus.http.auth.permission.public.policy=permit
quarkus.http.auth.permission.public.methods=GET

quarkus.http.auth.permission.protected.paths=/api/*
quarkus.http.auth.permission.protected.policy=authenticated

# OpenAPI/Swagger
quarkus.smallrye-openapi.path=/api/v1/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/api/v1/docs
mp.openapi.extensions.smallrye.info.title=Member Service API
mp.openapi.extensions.smallrye.info.version=1.0.0
mp.openapi.extensions.smallrye.info.description=Member management service for Service App

# Health checks
quarkus.smallrye-health.root-path=/health