# Application
quarkus.application.name=pricing-service
quarkus.http.port=8090

# MongoDB
quarkus.mongodb.connection-string=mongodb://${PRICING_DB_USERNAME}:${PRICING_DB_PASSWORD}@localhost:27017/${PRICING_DB_NAME}?authSource=admin
quarkus.mongodb.database=${PRICING_DB_NAME}

# OIDC / Keycloak (JWT resource server)
quarkus.oidc.auth-server-url=http://keycloak:8080/realms/service-app-realm
quarkus.oidc.application-type=service
quarkus.oidc.token.issuer=any

# RabbitMQ
rabbitmq-host=localhost
rabbitmq-port=5672
rabbitmq-username=${RABBITMQ_USERNAME}
rabbitmq-password=${RABBITMQ_PW}

# Reactive messaging - outgoing channel for price updates
mp.messaging.outgoing.price-updated-out.connector=smallrye-rabbitmq
mp.messaging.outgoing.price-updated-out.exchange.name=pricing.exchange
mp.messaging.outgoing.price-updated-out.exchange.type=topic
mp.messaging.outgoing.price-updated-out.exchange.durable=true
mp.messaging.outgoing.price-updated-out.routing-key=price.updated.key
mp.messaging.outgoing.price-updated-out.default-routing-key=price.updated.key

# Health
quarkus.smallrye-health.root-path=/actuator/health

# Metrics
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/actuator/prometheus

# OpenTelemetry
quarkus.otel.exporter.otlp.traces.endpoint=http://localhost:4318/v1/traces
quarkus.otel.exporter.otlp.metrics.endpoint=http://localhost:4318/v1/metrics
quarkus.otel.exporter.otlp.logs.endpoint=http://localhost:4318/v1/logs

# OpenAPI / Swagger
quarkus.smallrye-openapi.path=/v3/api-docs
quarkus.swagger-ui.path=/swagger-ui.html
quarkus.swagger-ui.always-include=true

# Security - permit health and swagger endpoints
quarkus.http.auth.permission.health.paths=/actuator/health,/actuator/health/*,/actuator/info
quarkus.http.auth.permission.health.policy=permit
quarkus.http.auth.permission.openapi.paths=/v3/api-docs/*,/swagger-ui/*,/swagger-ui.html
quarkus.http.auth.permission.openapi.policy=permit
quarkus.http.auth.permission.metrics.paths=/actuator/*
quarkus.http.auth.permission.metrics.policy=authenticated
quarkus.http.auth.permission.api.paths=/api/*
quarkus.http.auth.permission.api.policy=authenticated